<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEÑA-CHEF — Juego Virtual de Señas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #080C18;
    --surf: #0F172A;
    --card: #141E33;
    --card2: #19263E;
    --gold: #F59E0B;
    --golddark: #D97706;
    --coral: #F97316;
    --teal: #14B8A6;
    --green: #10B981;
    --red: #EF4444;
    --blue: #3B82F6;
    --purple: #8B5CF6;
    --text: #F1F5F9;
    --muted: #64748B;
    --border: #1E3A5F;
    --skin: #D4956A;
    --skindark: #B87D57;
    --skinshadow: #9A6548;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay for texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  #root { position: relative; z-index: 1; }

  input {
    background: var(--surf) !important;
    color: var(--text) !important;
    border: 1.5px solid var(--border) !important;
    border-radius: 10px !important;
    padding: 11px 14px !important;
    font-size: 15px !important;
    font-family: 'DM Sans', inherit !important;
    outline: none !important;
    width: 100%;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--gold) !important; }
  input::placeholder { color: var(--muted) !important; }

  button { cursor: pointer; transition: all 0.15s ease; }
  button:hover { filter: brightness(1.12); }
  button:active { transform: scale(0.96); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--surf); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.6; }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes glow {
    0%,100% { box-shadow: 0 0 20px rgba(245,158,11,0.2); }
    50%      { box-shadow: 0 0 40px rgba(245,158,11,0.45); }
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }
  .fade-up { animation: fadeUp 0.45s ease both; }
  .glow-gold { animation: glow 2.5s ease-in-out infinite; }

  .screen-content {
    max-width: 660px;
    margin: 0 auto;
    padding: 2rem 1rem;
    animation: fadeUp 0.35s ease both;
  }

  .tag-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 14px;
    color: var(--muted); font-size: 13px; font-weight: 500;
  }

  /* Card base */
  .game-card {
    background: var(--card);
    border-radius: 20px;
    border: 1.5px solid var(--border);
    padding: 2rem;
    transition: border-color 0.3s;
  }

  /* Progress bar */
  .progress-bar {
    height: 4px; background: var(--surf);
    border-radius: 2px; overflow: hidden; margin-bottom: 1.5rem;
  }
  .progress-fill {
    height: 100%; background: var(--gold);
    border-radius: 2px; transition: width 0.5s ease;
  }

  /* Dot nav */
  .dot-nav { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 1rem; }
  .dot-nav button {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent; font-size: 11px;
    transition: all 0.2s;
  }
  .dot-nav button.active { transform: scale(1.15); }
  .dot-nav button.done { opacity: 0.7; }

  /* Score pills row */
  .score-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1rem; }
  .score-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--card);
    transition: all 0.3s; flex: 1; min-width: 130px;
  }
  .score-pill .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .score-pill .name { color: var(--text); font-size: 14px; font-weight: 600; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .score-pill .pts { font-weight: 800; font-size: 19px; }

  /* Timer circle */
  .timer-wrap { text-align: center; }
  .timer-outer {
    width: 70px; height: 70px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto;
  }
  .timer-inner {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  .timer-num { font-weight: 900; font-size: 22px; font-family: 'Syne', sans-serif; }

  /* Buttons */
  .btn {
    border-radius: 10px; padding: 10px 22px;
    font-weight: 700; font-size: 15px;
    font-family: 'DM Sans', inherit;
    border: 1.5px solid transparent;
    line-height: 1;
  }
  .btn-primary { background: var(--gold); color: #000; border-color: var(--gold); }
  .btn-secondary { background: transparent; color: var(--gold); border-color: var(--gold); }
  .btn-danger { background: var(--red); color: #fff; border-color: var(--red); }
  .btn-ghost { background: transparent; color: var(--muted); border-color: transparent; }
  .btn-full { width: 100%; }
  .btn-lg { font-size: 17px; padding: 13px 36px; border-radius: 13px; }

  /* Grid for signs */
  .signs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
  }
  .sign-btn {
    background: var(--surf);
    border: 1.5px solid var(--border);
    border-radius: 10px; padding: 8px 6px;
    font-weight: 700; font-size: 12px;
    font-family: 'DM Sans', inherit;
    color: var(--muted); text-align: center;
    transition: all 0.15s;
  }
  .sign-btn.selected { }

  /* Header */
  .game-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.85rem 1.5rem;
    background: var(--surf);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(10px);
  }
  .game-header .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 900; font-size: 17px;
    color: var(--gold); letter-spacing: -0.5px;
  }

  /* Welcome hero */
  .hero-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(42px, 10vw, 64px);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: -3px;
    line-height: 1;
    margin: 0;
  }
  .hero-sub {
    font-size: 16px; font-weight: 700;
    color: var(--coral); letter-spacing: 0.2em;
    text-transform: uppercase; margin: 8px 0 18px;
  }

  /* Round label */
  .round-label {
    font-size: 11px; font-weight: 800; letter-spacing: 0.14em;
    text-transform: uppercase; margin-bottom: 2px;
  }
  .screen-title {
    font-family: 'Syne', sans-serif;
    font-size: 24px; font-weight: 800; color: var(--text);
  }

  /* Podium */
  .podium-item {
    display: flex; align-items: center; gap: 14px;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 16px; padding: 1rem 1.5rem;
    transition: transform 0.3s;
  }
  .podium-item.first { transform: scale(1.03); }
</style>
</head>

// ── ROUND 1
const Round1=({teams,setTeams,onFinish})=>{
  const pool=useRef([...SIGNS].sort(()=>Math.random()-0.5).slice(0,10));
  const [qi,setQi]=useState(0);
  const [phase,setPhase]=useState("ready");
  const [timer,setTimer]=useState(10);
  const ref=useRef(null);
  const sign=pool.current[qi];
  const start=()=>{setPhase("playing");setTimer(10)};
  useEffect(()=>{
    if(phase==="playing"){
      ref.current=setInterval(()=>{
        setTimer(t=>{if(t<=1){clearInterval(ref.current);setPhase("reveal");return 0;}return t-1;});
      },1000);
    }
    return()=>clearInterval(ref.current);
  },[phase]);
  const give=(i)=>setTeams(t=>t.map((x,j)=>j===i?{...x,score:x.score+(timer>5?15:10)}:x));
  const next=()=>{
    if(qi+1>=pool.current.length){onFinish();return;}
    setQi(i=>i+1);setPhase("ready");setTimer(10);
  };
  const reveal=()=>{clearInterval(ref.current);setPhase("reveal")};
  return(
    <div className="screen-content">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <div>
          <div className="round-label" style={{color:"var(--blue)"}}>RONDA 1</div>
          <h2 className="screen-title">¿Qué Seña Es?</h2>
        </div>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          {phase==="playing"&&<TimerCircle s={timer} total={10} color={timer<=3?"#EF4444":"#3B82F6"}/>}
          <span style={{color:"var(--muted)",fontSize:14,background:"var(--card)",borderRadius:8,padding:"5px 14px",border:"1px solid var(--border)"}}>{qi+1}/{pool.current.length}</span>
        </div>
      </div>

      <div className="game-card" style={{textAlign:"center",marginBottom:"1.5rem",borderColor:"#3B82F644"}}>
        {phase==="ready"&&<div>
          <div style={{fontSize:52,marginBottom:"0.75rem"}}>👁️</div>
          <p style={{color:"var(--muted)",fontSize:15,marginBottom:"1.5rem"}}>Presiona para revelar la siguiente seña a todos los equipos.</p>
          <Btn onClick={start} className="btn-lg" style={{minWidth:220}}>¡Mostrar Seña!</Btn>
        </div>}
        {(phase==="playing"||phase==="reveal")&&<div>
          <div style={{display:"flex",justifyContent:"center",marginBottom:"0.75rem"}}><HandIllustration id={sign.id} size={135}/></div>
          <div style={{fontSize:36}}>{sign.emoji}</div>
          {phase==="reveal"&&<>
            <h3 style={{fontFamily:"Syne,sans-serif",fontSize:34,fontWeight:900,color:sign.col,margin:"8px 0 4px"}}>{sign.word}</h3>
            <p style={{color:"var(--muted)",fontSize:13}}>{sign.short}</p>
          </>}
          {phase==="playing"&&<>
            <p style={{color:"var(--muted)",fontSize:16,margin:"0.75rem 0"}}>¿Qué alimento representa esta seña?</p>
            <Btn onClick={reveal} variant="secondary">Revelar respuesta</Btn>
          </>}
        </div>}
      </div>

      {phase==="reveal"&&<div style={{marginBottom:"1rem"}}>
        <p style={{color:"var(--text)",fontWeight:700,marginBottom:10}}>
          ¿Qué equipo respondió? &nbsp;
          <span style={{color:"var(--gold)",fontWeight:700}}>+{timer>5?15:10} pts{timer>5?" (bonus velocidad ⚡)":""}</span>
        </p>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:"1rem"}}>
          {teams.map((t,i)=>(
            <Btn key={i} onClick={()=>give(i)} style={{flex:1,minWidth:110,background:t.color+"22",borderColor:t.color,color:t.color}}>
              {t.name}
            </Btn>
          ))}
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={next} variant="ghost" style={{flex:1}}>Nadie adivinó</Btn>
          <Btn onClick={next} style={{flex:2}}>{qi+1>=pool.current.length?"Terminar Ronda 1 ✓":"Siguiente seña →"}</Btn>
        </div>
      </div>}

      <ScoreRow teams={teams}/>
    </div>
  );
};

// ── ROUND 2
const Round2=({teams,setTeams,onFinish})=>{
  const [tidx,setTidx]=useState(0);
  const [turn,setTurn]=useState(0);
  const [sign,setSign]=useState(null);
  const [phase,setPhase]=useState("assign");
  const [timer,setTimer]=useState(30);
  const [gp,setGp]=useState(false);
  const used=useRef(new Set());
  const ref=useRef(null);
  const team=teams[tidx];
  const getRand=()=>{
    const av=SIGNS.filter(s=>!used.current.has(s.id));
    if(!av.length){used.current.clear();return SIGNS[Math.floor(Math.random()*SIGNS.length)];}
    const s=av[Math.floor(Math.random()*av.length)];used.current.add(s.id);return s;
  };
  const assign=()=>{setSign(getRand());setPhase("demo");setTimer(30);};
  useEffect(()=>{
    if(phase==="demo"){
      ref.current=setInterval(()=>{
        setTimer(t=>{if(t<=1){clearInterval(ref.current);setPhase("score");return 0;}return t-1;});
      },1000);
    }
    return()=>clearInterval(ref.current);
  },[phase]);
  const mark=(ok)=>{if(ok)setTeams(t=>t.map((x,i)=>i===tidx?{...x,score:x.score+5}:x));setPhase("score2");setGp(true);};
  const giveGuess=(i)=>{if(i===tidx)return;setTeams(t=>t.map((x,j)=>j===i?{...x,score:x.score+10}:x));};
  const nextTurn=()=>{
    setGp(false);
    const nt=tidx*2+turn+1;
    if(nt>=teams.length*2){onFinish();return;}
    setTidx(Math.floor(nt/2));setTurn(nt%2);setSign(null);setPhase("assign");
  };
  return(
    <div className="screen-content">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <div>
          <div className="round-label" style={{color:"var(--coral)"}}>RONDA 2</div>
          <h2 className="screen-title">Chef de Señas</h2>
        </div>
        {phase==="demo"&&<TimerCircle s={timer} total={30} color="var(--coral)"/>}
      </div>
      <div className="game-card" style={{borderColor:team.color+"44",marginBottom:"1.5rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"1.5rem"}}>
          <div style={{width:16,height:16,borderRadius:"50%",background:team.color}}/>
          <span style={{fontFamily:"Syne,sans-serif",color:team.color,fontWeight:800,fontSize:20}}>{team.name}</span>
          <span style={{color:"var(--muted)",fontSize:13}}>Turno {tidx*2+turn+1} / {teams.length*2}</span>
        </div>
        {phase==="assign"&&<div style={{textAlign:"center"}}>
          <p style={{color:"var(--muted)",fontSize:14,lineHeight:1.65,marginBottom:"1.5rem"}}>Se asignará un alimento secreto a este equipo. Tendrán <strong style={{color:"var(--coral)"}}>30 segundos</strong> para demostrarlo con señas sin hablar.</p>
          <Btn onClick={assign} className="btn-lg" style={{background:team.color,borderColor:team.color,color:"#000",minWidth:200}}>Asignar Seña Secreta 🎲</Btn>
        </div>}
        {sign&&(phase==="demo"||phase==="score"||gp)&&<div>
          <div style={{background:"var(--surf)",borderRadius:14,padding:"1.25rem",marginBottom:"1rem",border:`2px solid ${sign.col}66`,textAlign:"center"}}>
            <div style={{color:"var(--muted)",fontSize:11,marginBottom:4,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase"}}>Seña a demostrar:</div>
            <div style={{fontSize:36}}>{sign.emoji}</div>
            <div style={{fontFamily:"Syne,sans-serif",color:sign.col,fontWeight:900,fontSize:28}}>{sign.word}</div>
            <div style={{color:"var(--muted)",fontSize:12,marginTop:2}}>{sign.short}</div>
          </div>
          {phase==="demo"&&<div style={{textAlign:"center"}}>
            <p style={{color:"var(--text)",fontSize:14,marginBottom:"0.75rem",animation:"pulse 1.5s ease-in-out infinite"}}>⏳ El equipo está demostrando la seña en cámara...</p>
            <Btn onClick={()=>{clearInterval(ref.current);setPhase("score")}} variant="secondary">Tiempo agotado → Evaluar</Btn>
          </div>}
          {phase==="score"&&!gp&&<div style={{textAlign:"center"}}>
            <p style={{color:"var(--text)",fontWeight:700,fontSize:15,marginBottom:12}}>¿El equipo hizo la seña correctamente?</p>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <Btn onClick={()=>mark(true)} style={{background:"var(--green)",borderColor:"var(--green)",color:"#fff"}}>✓ Correcto +5 pts</Btn>
              <Btn onClick={()=>mark(false)} variant="danger">✗ Incorrecto</Btn>
            </div>
          </div>}
          {gp&&<div>
            <p style={{color:"var(--text)",fontWeight:700,fontSize:15,marginBottom:10}}>¿Qué equipos adivinaron la seña? (+10 pts c/u)</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:"1rem"}}>
              {teams.map((t,i)=>i!==tidx&&(
                <Btn key={i} onClick={()=>giveGuess(i)} style={{flex:1,minWidth:110,background:t.color+"22",borderColor:t.color,color:t.color}}>{t.name} +10</Btn>
              ))}
            </div>
            <Btn onClick={nextTurn} className="btn-full">
              {tidx*2+turn+1>=teams.length*2-1?"Terminar Ronda 2 ✓":"Siguiente turno →"}
            </Btn>
          </div>}
        </div>}
      </div>
      <ScoreRow teams={teams} highlight={tidx}/>
    </div>
  );
};

// ── ROUND 3
const Round3=({teams,setTeams,onFinish})=>{
  const [tidx,setTidx]=useState(0);
  const [phase,setPhase]=useState("intro");
  const [timer,setTimer]=useState(60);
  const [correct,setCorrect]=useState([]);
  const [best,setBest]=useState("");
  const ref=useRef(null);
  const team=teams[tidx];
  const start=()=>{setPhase("playing");setTimer(60);setCorrect([])};
  useEffect(()=>{
    if(phase==="playing"){
      ref.current=setInterval(()=>{
        setTimer(t=>{if(t<=1){clearInterval(ref.current);setPhase("score");return 0;}return t-1;});
      },1000);
    }
    return()=>clearInterval(ref.current);
  },[phase]);
  const toggle=(id)=>setCorrect(c=>c.includes(id)?c.filter(x=>x!==id):[...c,id]);
  const confirm=()=>{
    const pts=correct.length*5;
    const mc=correct.length;
    setTeams(t=>t.map((x,i)=>i===tidx?{...x,score:x.score+pts,mc}:x));
    if(tidx+1>=teams.length){
      const all=teams.map((t,i)=>i===tidx?{...t,mc}:t);
      const b=all.reduce((a,c)=>(a.mc||0)>=(c.mc||0)?a:c);
      setBest(b.name);
      setTeams(t=>t.map(x=>x.name===b.name?{...x,score:x.score+20}:x));
      setPhase("done");
    }else{setTidx(i=>i+1);setPhase("intro");}
  };
  if(phase==="done")return(
    <div className="screen-content" style={{textAlign:"center"}}>
      <div style={{fontSize:60,marginBottom:"0.5rem"}}>🎊</div>
      <h3 style={{fontFamily:"Syne,sans-serif",color:"var(--gold)",fontSize:26,fontWeight:800}}>¡Rondas completadas!</h3>
      <p style={{color:"var(--text)",marginBottom:"1.5rem"}}>Bonus de +20 pts otorgado a: <strong style={{color:"var(--gold)"}}>{best}</strong></p>
      <Btn onClick={onFinish} className="btn-lg" style={{minWidth:200}}>Ver Resultados Finales 🏆</Btn>
    </div>
  );
  return(
    <div className="screen-content">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <div>
          <div className="round-label" style={{color:"var(--green)"}}>RONDA 3 · FINAL</div>
          <h2 className="screen-title">Creación de Menú</h2>
        </div>
        {phase==="playing"&&<TimerCircle s={timer} total={60} color="var(--green)"/>}
      </div>
      <div className="game-card" style={{borderColor:team.color+"44",marginBottom:"1.5rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"1.5rem"}}>
          <div style={{width:16,height:16,borderRadius:"50%",background:team.color}}/>
          <span style={{fontFamily:"Syne,sans-serif",color:team.color,fontWeight:800,fontSize:20}}>{team.name}</span>
        </div>
        {phase==="intro"&&<div style={{textAlign:"center"}}>
          <p style={{color:"var(--text)",fontSize:15,lineHeight:1.7,marginBottom:"1.5rem"}}>
            Este equipo tiene <strong style={{color:"var(--green)"}}>60 segundos</strong> para nombrar (en voz alta o en el chat) todos los alimentos del vocabulario que recuerde. Por cada uno correcto: <strong style={{color:"var(--gold)"}}>+5 pts</strong>.
          </p>
          <Btn onClick={start} className="btn-lg" style={{background:team.color,borderColor:team.color,color:"#000",minWidth:200}}>¡Iniciar! ⏱️</Btn>
        </div>}
        {phase==="playing"&&<div>
          <p style={{color:"var(--gold)",fontWeight:700,marginBottom:10}}>Marca los alimentos que el equipo diga correctamente:</p>
          <div className="signs-grid">
            {SIGNS.map(sg=>(
              <button key={sg.id} onClick={()=>toggle(sg.id)}
                className="sign-btn"
                style={{background:correct.includes(sg.id)?sg.col+"33":"var(--surf)",borderColor:correct.includes(sg.id)?sg.col:"var(--border)",color:correct.includes(sg.id)?sg.col:"var(--muted)"}}>
                {sg.emoji} {sg.word}
                {correct.includes(sg.id)&&<span style={{display:"block",fontSize:10,color:"var(--green)"}}>✓ correcto</span>}
              </button>
            ))}
          </div>
          <Btn onClick={()=>{clearInterval(ref.current);setPhase("score")}} variant="secondary" className="btn-full" style={{marginTop:"1rem"}}>Tiempo agotado → Evaluar</Btn>
        </div>}
        {phase==="score"&&<div style={{textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:8}}>📊</div>
          <div style={{fontFamily:"Syne,sans-serif",fontSize:44,color:"var(--gold)",fontWeight:900}}>{correct.length}</div>
          <p style={{color:"var(--muted)",marginBottom:"1rem"}}>señas recordadas</p>
          <div style={{background:"rgba(16,185,129,0.12)",border:"1px solid var(--green)",borderRadius:12,padding:"1rem",margin:"1rem 0",color:"var(--green)",fontWeight:800,fontSize:24}}>
            +{correct.length*5} puntos
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center",marginBottom:"1.5rem"}}>
            {correct.map(id=>{const sg=SIGNS[id];return(
              <span key={id} style={{background:sg.col+"22",borderRadius:8,padding:"3px 10px",color:sg.col,fontSize:12,fontWeight:700}}>{sg.emoji} {sg.word}</span>
            );})}
          </div>
          <Btn onClick={confirm} className="btn-lg" style={{minWidth:200}}>
            {tidx+1>=teams.length?"Ver Resultados →":"Siguiente equipo →"}
          </Btn>
        </div>}
      </div>
      <ScoreRow teams={teams} highlight={tidx}/>
    </div>
  );
};

// ── RESULTS
const Results=({teams,onRestart})=>{
  const sorted=[...teams].sort((a,b)=>b.score-a.score);
  const medals=["🥇","🥈","🥉","🏅"];
  return(
    <div className="screen-content">
      <div style={{textAlign:"center",marginBottom:"2rem"}}>
        <div style={{fontSize:60,marginBottom:"0.5rem"}}>🏆</div>
        <h2 style={{fontFamily:"Syne,sans-serif",fontSize:34,fontWeight:900,color:"var(--gold)",margin:"0 0 4px",letterSpacing:"-1px"}}>¡Resultados Finales!</h2>
        <p style={{color:"var(--coral)",fontWeight:700,fontSize:16}}>Campeones: {sorted[0].name} 🎊</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:"2rem"}}>
        {sorted.map((team,i)=>(
          <div key={i} className={"podium-item"+(i===0?" first":"")} style={{borderColor:i===0?team.color:"var(--border)",background:i===0?team.color+"22":"var(--card)"}}>
            <span style={{fontSize:28}}>{medals[i]||"🏅"}</span>
            <div style={{flex:1}}>
              <div style={{fontFamily:"Syne,sans-serif",color:i===0?team.color:"var(--text)",fontWeight:800,fontSize:18}}>{team.name}</div>
              <div style={{color:"var(--muted)",fontSize:12}}>Puesto #{i+1}</div>
            </div>
            <span style={{fontFamily:"Syne,sans-serif",color:i===0?team.color:"var(--text)",fontWeight:900,fontSize:30}}>{team.score}</span>
            <span style={{color:"var(--muted)",fontSize:12}}>pts</span>
          </div>
        ))}
      </div>
      <div style={{background:"var(--card)",borderRadius:14,padding:"1.25rem",marginBottom:"1.5rem",border:"1px solid var(--border)"}}>
        <div style={{color:"var(--gold)",fontWeight:700,marginBottom:6}}>🎯 Cierre Reflexivo</div>
        <p style={{color:"var(--muted)",fontSize:13.5,lineHeight:1.65,margin:0}}>¿Cuál fue la seña más fácil de recordar? ¿La más difícil? Hagan juntos las 15 señas una última vez como cierre grupal. ¡Excelente trabajo! 👏</p>
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"center"}}>
        <Btn onClick={onRestart} variant="secondary">↺ Jugar de nuevo</Btn>
        <Btn onClick={()=>{window.location.reload()}} style={{background:"var(--surf)",color:"var(--muted)",borderColor:"var(--border)"}}>Reiniciar todo</Btn>
      </div>
    </div>
  );
};

// ── APP PRINCIPAL
const App=()=>{
  const [screen,setScreen]=useState("welcome");
  const [teams,setTeams]=useState([
    {name:"Equipo Chef 🍳",score:0,color:TC[0]},
    {name:"Equipo Gourmet 👨‍🍳",score:0,color:TC[1]},
  ]);
  const go=s=>setScreen(s);
  const resetGame=()=>{setTeams(t=>t.map(x=>({...x,score:0,mc:0})));go("round1");};
  const phaseLabel={welcome:"Inicio",setup:"Equipos",vocab:"Vocabulario",rules:"Reglas",round1:"Ronda 1",round2:"Ronda 2",round3:"Ronda 3",results:"Resultados"};
  const showHeader=screen!=="welcome";
  return(
    <>
      {showHeader&&(
        <header className="game-header">
          <span className="logo">🎮 SEÑA-CHEF</span>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={{background:"var(--card)",borderRadius:8,padding:"4px 12px",color:"var(--muted)",fontSize:13,border:"1px solid var(--border)"}}>{phaseLabel[screen]}</span>
            {["round1","round2","round3"].includes(screen)&&teams.map((t,i)=>(
              <span key={i} style={{background:t.color+"22",border:`1px solid ${t.color}66`,borderRadius:8,padding:"4px 10px",color:t.color,fontSize:13,fontWeight:700}}>{t.score} pts</span>
            ))}
          </div>
        </header>
      )}
      {screen==="welcome"&&<Welcome onStart={()=>go("setup")}/>}
      {screen==="setup"&&<Setup teams={teams} setTeams={setTeams} onNext={()=>go("vocab")}/>}
      {screen==="vocab"&&<Vocab onFinish={()=>go("rules")}/>}
      {screen==="rules"&&<Rules onStart={()=>go("round1")}/>}
      {screen==="round1"&&<Round1 teams={teams} setTeams={setTeams} onFinish={()=>go("round2")}/>}
      {screen==="round2"&&<Round2 teams={teams} setTeams={setTeams} onFinish={()=>go("round3")}/>}
      {screen==="round3"&&<Round3 teams={teams} setTeams={setTeams} onFinish={()=>go("results")}/>}
      {screen==="results"&&<Results teams={teams} onRestart={resetGame}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
