<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEÑA-CHEF — Juego Virtual de Señas LSV</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080c18;color:#f1f5f9;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}
input{background:#0f172a;color:#f1f5f9;border:1.5px solid #1e3a5f;border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;outline:none;width:100%;transition:border-color .2s}
input:focus{border-color:#f59e0b}
input::placeholder{color:#64748b}
button{cursor:pointer;transition:all .15s ease}
button:hover{filter:brightness(1.12)}
button:active{transform:scale(0.96)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0f172a}
::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.btn{border-radius:10px;padding:10px 22px;font-weight:700;font-size:15px;font-family:inherit;border:1.5px solid #f59e0b;background:#f59e0b;color:#000;line-height:1}
.btn-secondary{background:transparent;color:#f59e0b;border-color:#f59e0b}
.btn-danger{background:#ef4444;color:#fff;border-color:#ef4444}
.btn-ghost{background:transparent;color:#64748b;border-color:transparent}
#header{display:flex;justify-content:space-between;align-items:center;padding:.85rem 1.5rem;background:#0f172a;border-bottom:1px solid #1e3a5f;position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:900;font-size:17px;color:#f59e0b;letter-spacing:-.5px}
.score-row{display:flex;gap:8px;flex-wrap:wrap}
.score-pill{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;border:1.5px solid #1e3a5f;background:#141e33;flex:1;min-width:130px;transition:all .3s}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pill-name{color:#f1f5f9;font-size:14px;font-weight:600;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
</style>
</head>
<body>

<div id="header" style="display:none">
  <span class="logo">🎮 SEÑA-CHEF</span>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="phase-label" style="background:#141e33;border-radius:8px;padding:4px 12px;color:#64748b;font-size:13px;border:1px solid #1e3a5f"></span>
    <div id="header-pts" style="display:flex;gap:6px"></div>
  </div>
</div>

<div id="app" style="padding:1rem .5rem"></div>

// ─── UTILIDADES ───────────────────────────────────────────────────────────
function el(id){ return document.getElementById(id); }
function html(id, h){ el(id).innerHTML = h; }
function show(id){ el(id).style.display = ""; }
function hide(id){ el(id).style.display = "none"; }
function stopTimer(){ if(timerInterval){ clearInterval(timerInterval); timerInterval = null; } }

function btn(label, onClick, style=""){
  const id = "btn_" + Math.random().toString(36).slice(2);
  setTimeout(() => { const b = el(id); if(b) b.onclick = onClick; }, 0);
  return `<button id="${id}" class="btn" style="${style}">${label}</button>`;
}

function scoreRow(highlightIdx=-1){
  return teams.map((t,i) => `
    <div class="score-pill" style="${i===highlightIdx?`border-color:${t.color};background:${t.color}22`:``}">
      <div class="dot" style="background:${t.color}"></div>
      <span class="pill-name">${t.name}</span>
      <span style="color:${t.color};font-weight:800;font-size:19px">${t.score}</span>
    </div>
  `).join("");
}

function signImg(word, size=200){
  return `<img src="${IMGS[word]}" style="width:${size}px;height:${size}px;object-fit:contain;background:#fff;border-radius:14px;padding:6px;display:block;margin:0 auto" alt="${word}">`;
}

function timerCircle(s, total, color){
  const pct = (s/total)*100;
  const alert = s<=3 ? "#ef4444" : color;
  return `<div style="width:70px;height:70px;border-radius:50%;background:conic-gradient(${alert} ${pct}%, #1e293b ${pct}%);display:flex;align-items:center;justify-content:center;flex-shrink:0">
    <div style="width:56px;height:56px;border-radius:50%;background:#080c18;display:flex;align-items:center;justify-content:center">
      <span id="timer-num" style="color:${alert};font-weight:900;font-size:22px;font-family:Syne,sans-serif">${s}</span>
    </div>
  </div>`;
}

function goTo(s){ screen = s; render(); }
function render(){
  stopTimer();
  el("header").style.display = screen==="welcome" ? "none" : "flex";
  if(screen !== "welcome"){
    const labels = {setup:"Equipos",vocab:"Vocabulario",rules:"Reglas",round1:"Ronda 1",round2:"Ronda 2",round3:"Ronda 3",results:"Resultados"};
    el("phase-label").textContent = labels[screen]||"";

      ? teams.map(t=>`<span style="background:${t.color}22;border:1px solid ${t.color}66;border-radius:8px;padding:4px 10px;color:${t.color};font-size:13px;font-weight:700">${t.score}pts</span>`).join("")
      : "";
    el("header-pts").innerHTML = ptsRow;
  }
  const screens = {welcome,setup,vocab,rules,round1,round2,round3,results};
  html("app", screens[screen] ? screens[screen]() : "");
  requestAnimationFrame(()=>{ el("app").style.animation="fadeUp .3s ease both"; });
}

// ─── RONDA 1 ──────────────────────────────────────────────────────────────
let r1Pool=[], r1Qi=0, r1Phase="ready", r1Timer=10;
function startRound1(){
  r1Pool = [...SIGNS].sort(()=>Math.random()-.5).slice(0,10);
  r1Qi=0; r1Phase="ready"; r1Timer=10;
  goTo("round1");
}
function round1(){
  const s = r1Pool[r1Qi];
  return `
  <div style="max-width:640px;margin:0 auto;padding:1.5rem 1rem">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">

        <div style="color:#3b82f6;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.14em">RONDA 1</div>

      </div>
      <div style="display:flex;gap:12px;align-items:center">
        ${r1Phase==="playing" ? timerCircle(r1Timer,10,"#3b82f6") : ""}
        <span style="color:#64748b;font-size:14px;background:#141e33;border-radius:8px;padding:5px 14px;border:1px solid #1e3a5f">${r1Qi+1}/${r1Pool.length}</span>
      </div>
    </div>
    <div style="background:#141e33;border-radius:20px;border:2px solid #3b82f644;padding:2rem;text-align:center;margin-bottom:1.5rem">
      ${r1Phase==="ready" ? `
        <div style="font-size:52px;margin-bottom:.75rem">👁️</div>
        <p style="color:#64748b;font-size:15px;margin-bottom:1.5rem">Presiona para mostrar la siguiente seña del diccionario.</p>
        <button class="btn" style="font-size:17px;padding:13px 36px;min-width:220px" onclick="r1Start()">¡Mostrar Seña!</button>
      ` : `
        <div>${signImg(s.w, 180)}</div>
        ${r1Phase==="reveal" ? `
          <div style="font-size:30px;margin-top:8px">${s.e}</div>
          <h3 style="font-family:Syne,sans-serif;font-size:30px;font-weight:900;color:${s.c};margin:8px 0 4px">${s.w}</h3>
        ` : `
          <button class="btn btn-secondary" style="margin-top:12px" onclick="r1Reveal()">Revelar respuesta</button>
        `}
      `}
    </div>
    ${r1Phase==="reveal" ? `
      <div>
        <p style="color:#f1f5f9;font-weight:700;margin-bottom:10px">
          ¿Qué equipo respondió?
          <span style="color:#f59e0b"> +${r1Timer>5?15:10} pts${r1Timer>5?" ⚡ bonus":""}</span>
        </p>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem">
          ${teams.map((t,i)=>`<button class="btn" onclick="r1Give(${i})" style="flex:1;min-width:110px;background:${t.color}22;border-color:${t.color};color:${t.color}">${t.name}</button>`).join("")}
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-ghost" onclick="r1Next()" style="flex:1">Nadie adivinó</button>
          <button class="btn" onclick="r1Next()" style="flex:2">${r1Qi+1>=r1Pool.length?"Terminar Ronda 1 ✓":"Siguiente seña →"}</button>
        </div>
      </div>
    ` : ""}
    <div class="score-row" style="margin-top:1rem">${scoreRow()}</div>
  </div>`;
}
function r1Start(){
  r1Phase="playing"; r1Timer=10; render();
  timerInterval = setInterval(()=>{
    r1Timer--;
    const tn = el("timer-num");
    if(tn){ tn.textContent=r1Timer; tn.style.color=r1Timer<=3?"#ef4444":"#3b82f6"; }
    if(r1Timer<=0){ stopTimer(); r1Phase="reveal"; render(); }
  },1000);
}
function r1Reveal(){ stopTimer(); r1Phase="reveal"; render(); }
function r1Give(i){ teams[i].score += r1Timer>5?15:10; r1Next(); }
function r1Next(){
  if(r1Qi+1>=r1Pool.length){ goTo("round2"); initRound2(); return; }
  r1Qi++; r1Phase="ready"; r1Timer=10; render();
}

// ─── RONDA 2 ──────────────────────────────────────────────────────────────
let r2Tidx=0, r2Turn=0, r2Sign=null, r2Phase="assign", r2Timer=30, r2Gp=false, r2Used=new Set();
function initRound2(){ r2Tidx=0; r2Turn=0; r2Sign=null; r2Phase="assign"; r2Timer=30; r2Gp=false; r2Used.clear(); goTo("round2"); }
function r2GetRand(){
  const av = SIGNS.filter(s=>!r2Used.has(s.id));
  if(!av.length){ r2Used.clear(); return SIGNS[Math.floor(Math.random()*SIGNS.length)]; }
  const s = av[Math.floor(Math.random()*av.length)]; r2Used.add(s.id); return s;
}
function round2(){
  const team = teams[r2Tidx];
  const s = r2Sign;
  const totalTurns = teams.length*2;
  return `
  <div style="max-width:640px;margin:0 auto;padding:1.5rem 1rem">

        <span style="color:#64748b;font-size:13px">Turno ${r2Tidx*2+r2Turn+1} / ${totalTurns}</span>
      </div>
      ${r2Phase==="assign" ? `
        <div style="text-align:center">
          <p style="color:#64748b;font-size:14px;line-height:1.65;margin-bottom:1.5rem">
            Se asignará un alimento. Tendrán <strong style="color:#f97316">30 segundos</strong> para demostrarlo en cámara sin hablar.
          </p>
          <button class="btn" style="font-size:17px;padding:13px 36px;background:${team.color};border-color:${team.color};color:#000;min-width:200px" onclick="r2Assign()">Asignar Seña Secreta 🎲</button>
        </div>
      ` : s ? `
        <div>
          <div style="background:#0f172a;border-radius:14px;padding:1.25rem;margin-bottom:1rem;border:2px solid ${s.c}66;text-align:center">
            <div style="color:#64748b;font-size:11px;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.1em">Seña a demostrar:</div>
            ${signImg(s.w, 120)}
            <div style="font-size:26px;margin-top:8px">${s.e}</div>
            <div style="font-family:Syne,sans-serif;color:${s.c};font-weight:900;font-size:24px">${s.w}</div>
            <div style="color:#64748b;font-size:12px;margin-top:2px">${s.s}</div>
          </div>
          ${r2Phase==="demo" ? `
            <div style="text-align:center">
              <p style="color:#f1f5f9;font-size:14px;margin-bottom:.75rem">⏳ El equipo está demostrando la seña...</p>
              <button class="btn btn-secondary" onclick="r2StopTimer()">Tiempo → Evaluar</button>
            </div>
          ` : r2Phase==="score" && !r2Gp ? `
            <div style="text-align:center">
              <p style="color:#f1f5f9;font-weight:700;font-size:15px;margin-bottom:12px">¿El equipo hizo la seña correctamente?</p>
              <div style="display:flex;gap:10px;justify-content:center">
                <button class="btn" style="background:#10b981;border-color:#10b981;color:#fff" onclick="r2Mark(true)">✓ Correcto +5 pts</button>
                <button class="btn btn-danger" onclick="r2Mark(false)">✗ Incorrecto</button>
              </div>
            </div>
          ` : r2Gp ? `
            <div>
              <p style="color:#f1f5f9;font-weight:700;font-size:15px;margin-bottom:10px">¿Qué equipos adivinaron? (+10 pts c/u)</p>
              <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem">
                ${teams.map((t,i)=>i!==r2Tidx?`<button class="btn" onclick="r2GiveGuess(${i})" style="flex:1;min-width:110px;background:${t.color}22;border-color:${t.color};color:${t.color}">${t.name} +10</button>`:"").join("")}
              </div>
              <button class="btn" style="width:100%" onclick="r2Next()">${r2Tidx*2+r2Turn+1>=totalTurns-1?"Terminar Ronda 2 ✓":"Siguiente turno →"}</button>
            </div>
          ` : ""}
        </div>
      ` : ""}
    </div>
    <div class="score-row">${scoreRow(r2Tidx)}</div>
  </div>`;
}
function r2Assign(){ r2Sign=r2GetRand(); r2Phase="demo"; r2Timer=30; render();
  timerInterval=setInterval(()=>{
    r2Timer--;
    const tn=el("timer-num"); if(tn){ tn.textContent=r2Timer; tn.style.color=r2Timer<=3?"#ef4444":"#f97316"; }
    if(r2Timer<=0){ stopTimer(); r2Phase="score"; render(); }
  },1000);
}
function r2StopTimer(){ stopTimer(); r2Phase="score"; render(); }
function r2Mark(ok){ if(ok) teams[r2Tidx].score+=5; r2Phase="score"; r2Gp=true; render(); }
function r2GiveGuess(i){ if(i!==r2Tidx) teams[i].score+=10; render(); }
function r2Next(){
  r2Gp=false;
  const nt=r2Tidx*2+r2Turn+1;
  if(nt>=teams.length*2){ initRound3(); return; }
  r2Tidx=Math.floor(nt/2); r2Turn=nt%2; r2Sign=null; r2Phase="assign"; render();
}

// ─── RONDA 3 ──────────────────────────────────────────────────────────────
let r3Tidx=0, r3Phase="intro", r3Timer=60, r3Correct=[], r3Best="";
function initRound3(){ r3Tidx=0; r3Phase="intro"; r3Timer=60; r3Correct=[]; r3Best=""; goTo("round3"); }
function round3(){
  const team = teams[r3Tidx];
  if(r3Phase==="done") return `
    <div style="max-width:500px;margin:0 auto;padding:3rem 1rem;text-align:center">
      <div style="font-size:60px;margin-bottom:.5rem">🎊</div>
      <h3 style="font-family:Syne,sans-serif;color:#f59e0b;font-size:26px;font-weight:800">¡Rondas completadas!</h3>
      <p style="color:#f1f5f9;margin-bottom:1.5rem">Bonus +20 pts para: <strong style="color:#f59e0b">${r3Best}</strong></p>
      <button class="btn" style="font-size:17px;padding:12px 32px;min-width:200px" onclick="goTo('results')">Ver Resultados 🏆</button>
    </div>`;
  return `
  <div style="max-width:640px;margin:0 auto;padding:1.5rem 1rem">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <div>
        <div style="color:#10b981;font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.14em">RONDA 3 · FINAL</div>
        <h2 style="font-family:Syne,sans-serif;color:#f1f5f9;font-size:22px;font-weight:800;margin:0">Creación de Menú</h2>
      </div>
      ${r3Phase==="playing" ? timerCircle(r3Timer,60,"#10b981") : ""}
    </div>
    <div style="background:#141e33;border-radius:20px;border:2px solid ${team.color}44;padding:2rem;margin-bottom:1.5rem">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem">
        <div style="width:16px;height:16px;border-radius:50%;background:${team.color}"></div>
        <span style="font-family:Syne,sans-serif;color:${team.color};font-weight:800;font-size:20px">${team.name}</span>
      </div>
      ${r3Phase==="intro" ? `
        <div style="text-align:center">
          <p style="color:#f1f5f9;font-size:15px;line-height:1.7;margin-bottom:1.5rem">
            Este equipo tiene <strong style="color:#10b981">60 segundos</strong> para nombrar todos los alimentos que recuerde. Por cada uno correcto: <strong style="color:#f59e0b">+5 pts</strong>.
          </p>
          <button class="btn" style="font-size:17px;padding:13px 36px;background:${team.color};border-color:${team.color};color:#000;min-width:200px" onclick="r3Start()">¡Iniciar! ⏱️</button>
        </div>
      ` : r3Phase==="playing" ? `
        <p style="color:#f59e0b;font-weight:700;margin-bottom:10px">Marca los alimentos que el equipo diga correctamente:</p>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem">
          ${SIGNS.map(sg=>`
            <button onclick="r3Toggle(${sg.id})" style="background:${r3Correct.includes(sg.id)?sg.c+"33":"#0f172a"};border:1.5px solid ${r3Correct.includes(sg.id)?sg.c:"#1e3a5f"};border-radius:10px;padding:8px 6px;cursor:pointer;color:${r3Correct.includes(sg.id)?sg.c:"#64748b"};font-weight:700;font-size:12px;font-family:inherit;text-align:center;transition:all .15s">
              <img src="${IMGS[sg.w]}" style="width:46px;height:46px;object-fit:contain;background:#fff;border-radius:6px;display:block;margin:0 auto 4px">
              ${sg.w}
              ${r3Correct.includes(sg.id)?'<span style="display:block;font-size:10px;color:#10b981">✓</span>':""}
            </button>
          `).join("")}
        </div>
        <button class="btn btn-secondary" style="width:100%" onclick="r3StopTimer()">Tiempo → Evaluar</button>
      ` : `
        <div style="text-align:center">
          <div style="font-size:48px;margin-bottom:8px">📊</div>
          <div style="font-family:Syne,sans-serif;font-size:44px;color:#f59e0b;font-weight:900">${r3Correct.length}</div>
          <p style="color:#64748b;margin-bottom:1rem">señas recordadas</p>
          <div style="background:rgba(16,185,129,.12);border:1px solid #10b981;border-radius:12px;padding:1rem;margin:1rem 0;color:#10b981;font-weight:800;font-size:24px">+${r3Correct.length*5} puntos</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:1.5rem">
            ${r3Correct.map(id=>{const sg=SIGNS[id];return`<span style="background:${sg.c}22;border-radius:8px;padding:3px 10px;color:${sg.c};font-size:12px;font-weight:700">${sg.e} ${sg.w}</span>`;}).join("")}
          </div>
          <button class="btn" style="font-size:16px;padding:12px 28px;min-width:200px" onclick="r3Confirm()">${r3Tidx+1>=teams.length?"Ver Resultados →":"Siguiente equipo →"}</button>
        </div>
      `}
    </div>
    <div class="score-row">${scoreRow(r3Tidx)}</div>
  </div>`;
}
function r3Start(){ r3Phase="playing"; r3Timer=60; r3Correct=[]; render();
  timerInterval=setInterval(()=>{
    r3Timer--;
    const tn=el("timer-num"); if(tn){ tn.textContent=r3Timer; tn.style.color=r3Timer<=3?"#ef4444":"#10b981"; }
    if(r3Timer<=0){ stopTimer(); r3Phase="score"; render(); }
  },1000);
}
function r3Toggle(id){ const i=r3Correct.indexOf(id); if(i===-1)r3Correct.push(id); else r3Correct.splice(i,1); render(); }
function r3StopTimer(){ stopTimer(); r3Phase="score"; render(); }
function r3Confirm(){
  teams[r3Tidx].score += r3Correct.length*5;
  const mc = r3Correct.length;
  teams[r3Tidx]._mc = mc;
  if(r3Tidx+1>=teams.length){
    const best = teams.reduce((a,b)=>(a._mc||0)>=(b._mc||0)?a:b);
    r3Best = best.name;
    best.score += 20;
    r3Phase="done"; render();
  } else { r3Tidx++; r3Phase="intro"; r3Timer=60; r3Correct=[]; render(); }
}

// ─── RESULTADOS ───────────────────────────────────────────────────────────
function results(){
  const sorted=[...teams].sort((a,b)=>b.score-a.score);
  const medals=["🥇","🥈","🥉","🏅"];
  return `
  <div style="max-width:540px;margin:0 auto;padding:2rem 1rem">
    <div style="text-align:center;margin-bottom:2rem">
      <div style="font-size:60px;margin-bottom:.5rem">🏆</div>
      <h2 style="font-family:Syne,sans-serif;font-size:30px;font-weight:900;color:#f59e0b;margin:0 0 4px;letter-spacing:-1px">¡Resultados Finales!</h2>
      <p style="color:#f97316;font-weight:700;font-size:16px">Campeones: ${sorted[0].name} 🎊</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:2rem">
      ${sorted.map((t,i)=>`
        <div style="display:flex;align-items:center;gap:14px;background:${i===0?t.color+"22":"#141e33"};border:2px solid ${i===0?t.color:"#1e3a5f"};border-radius:16px;padding:1rem 1.5rem;transform:${i===0?"scale(1.03)":"scale(1)"}">
          <span style="font-size:26px">${medals[i]||"🏅"}</span>
          <div style="flex:1">
            <div style="font-family:Syne,sans-serif;color:${i===0?t.color:"#f1f5f9"};font-weight:800;font-size:17px">${t.name}</div>
            <div style="color:#64748b;font-size:12px">Puesto #${i+1}</div>
          </div>
          <span style="font-family:Syne,sans-serif;color:${i===0?t.color:"#f1f5f9"};font-weight:900;font-size:28px">${t.score}</span>
          <span style="color:#64748b;font-size:12px">pts</span>
        </div>
      `).join("")}
    </div>
    <div style="background:#141e33;border-radius:14px;padding:1.25rem;margin-bottom:1.5rem;border:1px solid #1e3a5f">
      <div style="color:#f59e0b;font-weight:700;margin-bottom:6px">🎯 Cierre</div>
      <p style="color:#64748b;font-size:13.5px;line-height:1.65;margin:0">¿Cuál seña fue más fácil? ¿La más difícil? Hagan juntos las 15 señas una última vez. ¡Excelente trabajo! 👏</p>
    </div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn btn-secondary" onclick="resetGame()">↺ Jugar de nuevo</button>
      <button class="btn" style="background:#0f172a;color:#64748b;border-color:#1e3a5f" onclick="location.reload()">Reiniciar todo</button>
    </div>
  </div>`;
}
function resetGame(){ teams.forEach(t=>{t.score=0;t._mc=0;}); startRound1(); }

// Iniciar
vocabIdx = 0;
render();
</script>
</body>
